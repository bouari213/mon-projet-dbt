version: 2

models:
  - name: fct_commandes_clients
    description: "Modèle final qui combine les commandes et les clients pour produire une vue analytique complète"
    columns:
      - name: id_commande
        description: "Identifiant unique de la commande"
        tests:
          - unique
          - not_null
      - name: date_commande
        description: "Date de la commande"
      - name: montant
        description: "Montant de la commande en euros"
      - name: statut
        description: "Statut de la commande : livree, en_cours ou annulee"
      - name: nom
        description: "Nom du client en majuscules"
      - name: prenom
        description: "Prénom du client"
      - name: email
        description: "Adresse email du client"